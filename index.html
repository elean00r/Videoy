<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTube Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#0f0f0f;
font-family:Arial;
color:#fff;
}

.header{
height:60px;
display:flex;
align-items:center;
padding:0 20px;
font-size:22px;
font-weight:bold;
color:#e50914;
}

.player{
max-width:1000px;
margin:20px auto;
padding:0 15px;
}

.player video{
width:100%;
border-radius:12px;
background:#000;
}

.row{
margin:20px;
}

.row-title{
margin-bottom:10px;
font-size:18px;
}

.row-list{
display:flex;
gap:10px;
overflow-x:auto;
}

.row-list::-webkit-scrollbar{
display:none;
}

.card{
min-width:160px;
cursor:pointer;
transition:.3s;
position:relative;
}

.card img{
width:100%;
border-radius:10px;
}

.card:hover{
transform:scale(1.12);
z-index:5;
}

.play-icon{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
color:#fff;
background:rgba(0,0,0,0.6);
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
opacity:1;
pointer-events:none;
}

.card-info{
position:absolute;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,0.7);
padding:5px;
font-size:12px;
border-radius:0 0 10px 10px;
}

@media(max-width:768px){
.card{min-width:120px;}
}
</style>
</head>

<body>

<div class="header">MyTube Pro</div>

<!-- VIDEO -->
<div class="player">
  <video id="video" controls></video>
</div>

<!-- TRENDING -->
<div class="row">
  <div class="row-title">🔥 Trending Now</div>
  <div class="row-list" id="trending"></div>
</div>

<!-- RECOMMENDED -->
<div class="row">
  <div class="row-title">🎯 Recommended For You</div>
  <div class="row-list" id="recommended"></div>
</div>

<script>

// =======================
// MAIN DATABASE (SEMUA VIDEO)
// =======================
const videos = [
{id:"b6ebtLM61",title:"Viral Explosion",thumb:"https://cdn.aceimg.com/4c6adc60f.png"},
{id:"b6ebtLM61",title:"Crazy Moment",thumb:"https://cdn.aceimg.com/3722eb687.png"},
{id:"b6ebtLM61",title:"Top Trending",thumb:"https://cdn.aceimg.com/256903f41.png"},
{id:"b6ebtLM61",title:"Must Watch",thumb:"https://cdn.aceimg.com/abf8849c1.png"},
{id:"b6ebtLM61",title:"Unbelievable",thumb:"https://cdn.aceimg.com/be92c85b8.png"},
{id:"FB52GziE1",title:"🔥 Insane Clip",thumb:"https://cdn.aceimg.com/e5cb87f28.png"},
{id:"JL8naMl81",title:"Best Video",thumb:"https://cdn.aceimg.com/2dad0740c.png"},
{id:"8KQyvCLb1",title:"Hot Right Now",thumb:"https://cdn.aceimg.com/547cf763d.png"},
{id:"8KQyvCLb1",title:"Hot Right Now",thumb:"https://cdn.aceimg.com/e596a8f6a.png"},
{id:"8KQyvCLb1",title:"Hot Right Now",thumb:"https://cdn.aceimg.com/fe63b5d23.png"}
];

// =======================
// SHUFFLE FUNCTION
// =======================
function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

// =======================
// GET CURRENT VIDEO
// =======================
const params = new URLSearchParams(location.search);
let id = params.get("id") || "I0qRfHhX1";

const video = document.getElementById("video");
video.src = "https://cdn2.videy.co/" + id + ".mp4";

// =======================
// FILTER OUT CURRENT VIDEO
// =======================
const available = videos.filter(v => v.id !== id);

// =======================
// SEPARATE DATA (IMPORTANT PART)
// =======================

// 🔥 TRENDING = random 5 video
const trending = shuffle([...available]).slice(0,5);

// 🎯 RECOMMENDED = different set (no overlap)
const remainingForRecommended = available.filter(v => !trending.includes(v));
const recommended = shuffle([...remainingForRecommended]).slice(0,6);

// =======================
// RENDER FUNCTION
// =======================
function render(containerId, data){
  const container = document.getElementById(containerId);

  data.forEach(v=>{
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => location.search = "?id=" + v.id;

    card.innerHTML = `
      <img src="${v.thumb}">
      <div class="play-icon">▶</div>
      <div class="card-info">${v.title}</div>
    `;

    container.appendChild(card);
  });
}

// =======================
// LOAD UI
// =======================
render("trending", trending);
render("recommended", recommended);

</script>

</body>
</html>
