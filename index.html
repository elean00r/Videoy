<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Video</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
font-family:Arial, sans-serif;
color:#fff;
}

/* VIDEO */
.video-container{
position:relative;
width:100%;
height:60vh;
background:#000;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* PLAY BUTTON */
.play-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80px;
height:80px;
border-radius:50%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:10;
}

.play-overlay:after{
content:'▶';
font-size:30px;
color:#fff;
margin-left:5px;
}

/* STATS */
.stats{
padding:12px;
font-size:14px;
opacity:0.9;
}

/* IKLAN HALUS */
.native-ad{
margin:10px;
padding:12px;
background:#111;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.native-ad:hover{
background:#1a1a1a;
}

/* COMMENTS */
.comments{
padding:10px;
}

.comment{
margin-bottom:12px;
padding-bottom:8px;
border-bottom:1px solid #222;
}

.comment b{
font-size:13px;
}

.comment p{
font-size:13px;
opacity:0.85;
}
</style>
</head>

<body>

<!-- VIDEO -->
<div class="video-container">
<video id="videoPlayer" muted playsinline></video>

<div class="play-overlay" id="playBtn"></div>
</div>

<!-- STATS -->
<div class="stats">
👁️ 1.2M views &nbsp;&nbsp; 👍 34K likes
</div>

<!-- IKLAN HALUS -->
<div class="native-ad" onclick="redirectAd()">
👉 Watch full video / Download
</div>

<!-- KOMENTAR PALSU -->
<div class="comments">

<div class="comment">
<b>Michael</b>
<p>This video is crazy 😳</p>
</div>

<div class="comment">
<b>Sarah</b>
<p>I didn't expect that ending...</p>
</div>

<div class="comment">
<b>David</b>
<p>Where can I watch full version?</p>
</div>

<div class="comment">
<b>Anna</b>
<p>This deserves more views 🔥</p>
</div>

</div>

<script>
// ambil ID dari URL
const params = new URLSearchParams(window.location.search);
let videoId = params.get("id");

// default biar tidak blank
if(!videoId){
  videoId = "I0qRfHhX1";
}

const video = document.getElementById("videoPlayer");
const playBtn = document.getElementById("playBtn");

// set video source
video.src = "https://cdn2.videy.co/" + videoId + ".mp4";

// klik play pertama
let firstClick = true;

playBtn.addEventListener("click", () => {

  if(firstClick){
    firstClick = false;

    // 👉 GANTI LINK IKLAN DISINI
    window.open("https://example.com", "_blank");
  }

  video.play();
  playBtn.style.display = "none";
});

// fallback kalau error
video.onerror = () => {
  alert("Video gagal dimuat");
};

// redirect dari tombol iklan halus
function redirectAd(){
  window.open("https://example.com", "_blank");
}
</script>

</body>
</html>
