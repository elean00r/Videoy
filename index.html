<html lang="en">
<head>

<title>Videoy ONLINE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#0f0f0f;
font-family:Arial;
color:#fff;
}

.header{
height:60px;
display:flex;
align-items:center;
padding:0 20px;
border-bottom:1px solid #222;
font-weight:bold;
color:#e50914;
}

.layout{
max-width:1000px;
margin:auto;
padding:20px;
}

.player video{
width:100%;
border-radius:12px;
background:#000;
}

/* CHANNEL */
.main-channel{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
padding:12px;
background:#111;
border-radius:12px;
flex-wrap:wrap;
gap:10px;
}

.channel-left{
display:flex;
align-items:center;
gap:10px;
}

.channel-left img{
width:45px;
height:45px;
border-radius:50%;
}

.channel-info{
display:flex;
flex-direction:column;
}

.channel-name{
font-weight:bold;
font-size:15px;
}

.channel-actions{
display:flex;
gap:10px;
}

.btn-follow{
background:#ff9900;
border:none;
padding:8px 14px;
border-radius:6px;
color:#000;
font-weight:bold;
cursor:pointer;
}

.btn-join{
background:transparent;
border:1px solid #ff9900;
padding:8px 14px;
border-radius:6px;
color:#ff9900;
cursor:pointer;
}

/* RECOMMEND */
.recommend{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.item{
position:relative;
border-radius:10px;
overflow:hidden;
cursor:pointer;
background:#111;
}

.thumb{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
}

/* PLAY ICON */
.play-icon{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:50px;
height:50px;
background:rgba(0,0,0,0.6);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#fff;
transition:0.3s;
}

.item:hover .play-icon{
background:#e50914;
transform:translate(-50%,-50%) scale(1.1);
}

.channel{
padding:6px;
font-size:12px;
color:#aaa;
display:flex;
align-items:center;
gap:5px;
}

.channel img{
width:20px;
height:20px;
border-radius:50%;
}

.view-more{
margin-top:25px;
text-align:center;
cursor:pointer;
color:#aaa;
}

@media(max-width:700px){
.recommend{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="header">VideOY ONLINE</div>

<div class="layout">

<div class="player">
<video id="video" controls preload="metadata"></video>
</div>

<div class="main-channel" id="mainChannel"></div>
<div class="recommend" id="list"></div>

<div class="view-more" onclick="goMore()">VIEW MORE</div>

</div>

<script>

const params = new URLSearchParams(location.search);
let id = params.get("id") || "2RUb0Ci91";

const video = document.getElementById("video");
const mainChannel = document.getElementById("mainChannel");
const list = document.getElementById("list");

const videos = [
{id:"2RUb0Ci91",thumb:"https://cdn.aceimg.com/f129a271f.jpg", author:"Eleanor", avatar:"https://cdn.aceimg.com/1e8e7d3f8.jpg"},
{id:"4JvPvFsj1",thumb:"https://cdn.aceimg.com/39bd56b70.jpg", author:"Eleanor", avatar:"https://cdn.aceimg.com/1e8e7d3f8.jpg"},
{id:"6QVMOXCv1",thumb:"https://cdn.aceimg.com/452340590.jpg", author:"Eleanor", avatar:"https://cdn.aceimg.com/1e8e7d3f8.jpg"}
];

const currentVideo = videos.find(v=>v.id===id);
video.src = "https://cdn2.videy.co/" + id + ".mp4";

/* 🔥 FACEBOOK */
function goFacebook(){
  window.open("https://www.facebook.com/profile.php?id=61587017235092", "_blank");
}

/* CHANNEL */
if(currentVideo){
  mainChannel.innerHTML = `
    <div class="channel-left">
      <img src="${currentVideo.avatar}">
      <div class="channel-info">
        <div class="channel-name">${currentVideo.author}</div>
      </div>
    </div>

    <div class="channel-actions">
      <button class="btn-follow" onclick="goFacebook()">Follow</button>
      <button class="btn-join" onclick="goFacebook()">Join</button>
    </div>
  `;
}

/* RENDER */
let visible = 6;

function render(){
  list.innerHTML="";
  videos.slice(0,visible).forEach(v=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <img src="${v.thumb}" class="thumb">
      <div class="play-icon">▶</div>
      <div class="channel">
        <img src="${v.avatar}">
        ${v.author}
      </div>
    `;
    div.onclick=()=>location.search="?id="+v.id;
    list.appendChild(div);
  });
}

render();

function goMore(){
  visible+=6;
  render();
}

/* 🔥 REDIRECT IKLAN (1x saja) */
let triggered = false;

function goAds(){
  if(!triggered){
    triggered = true;
    window.open("https://dutchrelay.com/vd78mmh36?key=4dae5a7b3a35efc75237bbcd686ccb9f", "_blank");
  }
}

video.addEventListener("play", goAds);
video.addEventListener("click", goAds);

</script>
