<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WATCH NOW 😱🔥</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;color:#fff;}

.video-container{
position:relative;
width:100%;
height:65vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
overflow:hidden;
}

video{width:100%;height:100%;object-fit:contain;}

.play-overlay{
position:absolute;
width:120px;height:120px;border-radius:50%;
background:linear-gradient(145deg,#ffffff25,#ffffff05);
backdrop-filter:blur(12px);
display:flex;align-items:center;justify-content:center;
cursor:pointer;animation:pulse 1.5s infinite;
box-shadow:0 0 30px rgba(255,255,255,0.2);
}
.play-overlay:after{content:'▶';font-size:48px;color:#fff;margin-left:6px;}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.loader{
position:absolute;width:60px;height:60px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid #fff;border-radius:50%;
animation:spin 1s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg);}}

.progress{
position:absolute;bottom:0;left:0;height:3px;width:0%;
background:#ff0000;
}

.title{padding:14px;font-size:16px;font-weight:600;}
.stats{padding:0 14px 12px;font-size:14px;display:flex;gap:15px;opacity:0.85;}
.live{color:#0f0;font-size:13px;padding:0 14px 10px;}
.divider{height:1px;background:#222;margin:10px 0;}

.recommend{padding:14px;}
.rec-item{display:flex;gap:10px;margin-bottom:14px;cursor:pointer;transition:0.25s;}
.rec-item:hover{transform:scale(1.04);}
.thumb{width:120px;height:70px;border-radius:10px;overflow:hidden;background:#222;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.rec-info{flex:1;font-size:13px;}
.rec-info b{display:block;margin-bottom:4px;}
</style>
</head>

<script src="https://dutchrelay.com/73/ed/07/73ed0749fb832c6d6f88048a2e5c9591.js"></script>

<body>

<div class="video-container">
  <video id="videoPlayer" controls playsinline preload="metadata"></video>
  <div class="play-overlay" id="playBtn"></div>
  <div class="loader" id="loader"></div>
  <div class="progress" id="progressBar"></div>
</div>

<div class="title" id="videoTitle">Loading...</div>

<div class="stats">
<span>👁️ 1.2M views</span>
<span>👍 34K likes</span>
</div>

<div class="live">● 1,024 watching now</div>

<div class="divider"></div>

<div class="recommend">
  <div id="recContainer"></div>
</div>

<script>
const video=document.getElementById("videoPlayer");
const playBtn=document.getElementById("playBtn");
const loader=document.getElementById("loader");
const progressBar=document.getElementById("progressBar");
const titleEl=document.getElementById("videoTitle");

const redirectLink="https://dutchrelay.com/pmy9zqw6ug?key=ff6ee12c4ad4389fd54f705d80b8b55d";

/* VIDEO LIST + CUSTOM ID */
const videoList=[
{id:"elm8StLp1",src:"https://cdn2.videy.co/nFZL3N1s1.mp4",title:"Damn… slow down 😳",thumb:"https://cdn.aceimg.com/bf73fe1b6.jpg"},
{id:"abc123XYZ",src:"https://cdn2.videy.co/PLYlJIPH1.mp4",title:"He said ‘do it’ 😌",thumb:"https://cdn.aceimg.com/210031f34.jpg"},
{id:"test999AAA",src:"https://cdn2.videy.co/YZsNNiG61.mp4",title:"Confused 😅",thumb:"https://cdn.aceimg.com/bb5a5ded3.jpg"},
{id:"wow777PPP",src:"https://cdn2.videy.co/Iogtb6Py1.mp4",title:"Wasn’t ready 😭",thumb:"https://cdn.aceimg.com/dcea08f4d.jpg"},
{id:"xoxo555LMN",src:"https://cdn2.videy.co/SUH3vZqt1.mp4",title:"Turn it down 🤫",thumb:"https://cdn.aceimg.com/70b5b402d.jpg"}
];

/* GET VIDEO */
function getVideoFromURL(){
 const params=new URLSearchParams(window.location.search);

 const id=params.get("id");
 const v=params.get("v");

 // PRIORITAS 1 → CUSTOM ID
 if(id){
  const found=videoList.find(x=>x.id===id);
  if(found) return found;
 }

 // PRIORITAS 2 → INDEX
 if(v && !isNaN(v)){
  let index=parseInt(v);
  if(index>=0 && index<videoList.length){
   return videoList[index];
  }
 }

 // PRIORITAS 3 → DIRECT LINK
 if(v){
  const found=videoList.find(x=>x.src===v);
  if(found) return found;

  return {
   src:v,
   title:"Watch now 😱🔥",
   thumb:"https://cdn.aceimg.com/36f8b3634.jpg"
  };
 }

 return videoList[0];
}

/* LOAD VIDEO */
function loadVideo(v){
 video.src=v.src;
 titleEl.innerText=v.title;
 video.load();

 playBtn.style.display="flex";

 if(v.id){
  history.replaceState(null,"",`?id=${v.id}`);
 }else{
  const index=videoList.findIndex(x=>x.src===v.src);
  if(index!==-1){
   history.replaceState(null,"",`?v=${index}`);
  }
 }

 render(v.src);
}

/* PLAY */
playBtn.onclick=()=>{
 playBtn.style.display="none";
 loader.style.display="block";

 setTimeout(()=>{
  loader.style.display="none";
  video.play();

  setTimeout(()=>{
   window.open(redirectLink,"_blank");
  },500);

 },800);
};

/* UI FIX */
video.onplay=()=>{
 playBtn.style.display="none";
 loader.style.display="none";
};

video.onpause=()=>{
 playBtn.style.display="flex";
};

/* PROGRESS */
video.ontimeupdate=()=>{
 if(video.duration){
  progressBar.style.width=(video.currentTime/video.duration)*100+"%";
 }
};

/* RECOMMEND */
function render(current=""){
 const box=document.getElementById("recContainer");
 box.innerHTML="";

 videoList
 .filter(v=>v.src!==current)
 .sort(()=>0.5-Math.random())
 .slice(0,5)
 .forEach(v=>{
  const d=document.createElement("div");
  d.className="rec-item";
  d.innerHTML=`
   <div class="thumb"><img src="${v.thumb}"></div>
   <div class="rec-info">
     <b>${v.title}</b>
     ${Math.floor(Math.random()*2+1)}.${Math.floor(Math.random()*9)}M views
   </div>`;
  d.onclick=()=>loadVideo(v);
  box.appendChild(d);
 });
}

/* INIT */
loadVideo(getVideoFromURL());
</script>

</body>
</html>
