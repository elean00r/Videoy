<!DOCTYPE html>
<html lang="id">
<head>
<meta name="clckd" content="6f2b7530d3dd593cdad60204559f161f" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayNaw Online</title>

<meta name="referrer" content="no-referrer-when-downgrade">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#0f0f0f;
font-family:Arial;
color:#fff;
}

.header{
height:60px;
display:flex;
align-items:center;
padding:0 20px;
border-bottom:1px solid #222;
font-weight:bold;
color:#e50914;
}

.layout{
max-width:1000px;
margin:auto;
padding:20px;
}

.player video{
width:100%;
border-radius:12px;
background:#000;
}

/* 🔥 CHANNEL STYLE */
.channel-box{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.channel-box img{
width:35px;
height:35px;
border-radius:50%;
}

.channel-info{
display:flex;
flex-direction:column;
}

.channel-name{
font-weight:bold;
font-size:14px;
}

.channel-sub{
font-size:12px;
color:#aaa;
}

/* 🔥 RECOMMEND */
.recommend{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.item{
position:relative;
border-radius:10px;
overflow:hidden;
cursor:pointer;
background:#111;
transition:0.2s;
}

.item:hover{transform:scale(1.03)}

.thumb{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
display:block;
}

.play-icon{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.6);
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.preview-video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
display:none;
}

.channel{
padding:6px;
font-size:12px;
color:#aaa;
background:#0f0f0f;
border-top:1px solid #1f1f1f;
display:flex;
align-items:center;
gap:5px;
}

.channel img{
width:20px;
height:20px;
border-radius:50%;
}

.actions{
margin-top:10px;
display:flex;
gap:10px;
}

.btn{
background:#1f1f1f;
border:none;
padding:8px 14px;
border-radius:20px;
color:#fff;
cursor:pointer;
}

.btn:hover{
background:#e50914;
}

@media(max-width:700px){
.recommend{
grid-template-columns:repeat(2,1fr);
}
}
</style>
</head>

<body>

<div class="header">MyTube</div>

<div class="layout">

<!-- 🔴 BANNER -->
<div style="margin-bottom:15px;text-align:center;">

</div>

<div class="player">
<video id="video" controls preload="metadata"></video>
</div>

<!-- 🔥 CHANNEL INFO (YOUTUBE STYLE) -->
<div class="channel-box" id="channelBox"></div>

<div class="actions">
<button class="btn" onclick="share()">Share</button>
</div>

<!-- 🔥 RECOMMEND -->
<div class="recommend" id="list"></div>

</div>

<!-- 🔴 FLOATING ADS -->
<div style="position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:9999;"></div>

<script>

const params = new URLSearchParams(location.search);
let id = params.get("id") || "I0qRfHhX1";

const video = document.getElementById("video");
const channelBox = document.getElementById("channelBox");
const list = document.getElementById("list");

function valid(i){
  return /^[a-zA-Z0-9_-]+$/.test(i);
}

/* 🔥 DATA VIDEO */
const videos = [
{id:"2PuPDhgq1",thumb:"https://cdn.aceimg.com/64ae3c00e.jpg", author:"Music Vibes", avatar:"https://cdn.aceimg.com/c90e7a7f2.jpg"},
{id:"6GGd2Ah21",thumb:"https://cdn.aceimg.com/37b0ccb06.jpg", author:"Music Vibes", avatar:"https://cdn.aceimg.com/c90e7a7f2.jpg"},
{id:"9KTubcAo1",thumb:"https://cdn.aceimg.com/dd04108e1.jpg", author:"Music Vibes", avatar:"https://cdn.aceimg.com/c90e7a7f2.jpg"},
{id:"auvBrlko1",thumb:"https://cdn.aceimg.com/e894a6fa5.jpg", author:"Music Vibes", avatar:"https://cdn.aceimg.com/c90e7a7f2.jpg"},
{id:"BcKWWEEX1",thumb:"https://cdn.aceimg.com/5a20cb7fa.jpg", author:"Music Vibes", avatar:"https://cdn.aceimg.com/c90e7a7f2.jpg"},
{id:"bHQcsieZ1",thumb:"https://cdn.aceimg.com/ecc690109.jpg", author:"Music Vibes", avatar:"https://cdn.aceimg.com/c90e7a7f2.jpg"},
{id:"f194f47f1",thumb:"https://cdn.aceimg.com/e4e1b0276.jpg", author:"Music Vibes", avatar:"https://cdn.aceimg.com/c90e7a7f2.jpg"},
{id:"h4pJqNKT1",thumb:"https://cdn.aceimg.com/67de286cc.jpg", author:"Music Vibes", avatar:"https://cdn.aceimg.com/c90e7a7f2.jpg"},
{id:"i39zjhHL1",thumb:"https://cdn.aceimg.com/5082cf83f.jpg", author:"Music Vibes", avatar:"https://cdn.aceimg.com/c90e7a7f2.jpg"},
{id:"P2JvpjL61",thumb:"https://cdn.aceimg.com/75f67e1ef.jpg", author:"Music Vibes", avatar:"https://cdn.aceimg.com/c90e7a7f2.jpg"},
{id:"tWrpI4t71",thumb:"https://cdn.aceimg.com/7dd8ded4d.jpg", author:"Music Vibes", avatar:"https://cdn.aceimg.com/c90e7a7f2.jpg"},
{id:"K0FqNyYX1",thumb:"https://cdn.aceimg.com/8daaf0c31.jpg", author:"Music Vibes", avatar:"https://cdn.aceimg.com/c90e7a7f2.jpg"}
];

const currentVideo = videos.find(v=>v.id===id);

/* 🔥 MAIN VIDEO */
if(valid(id)){
  video.src = "https://cdn2.videy.co/" + id + ".mp4";

  if(currentVideo){
    channelBox.innerHTML = `
      <img src="${currentVideo.avatar}">
      <div class="channel-info">
        <div class="channel-name">${currentVideo.author}</div>
        <div class="channel-sub">Official Channel</div>
      </div>
    `;
  }else{
    channelBox.innerHTML = `
      <div class="channel-name">PlayNAW</div>
    `;
  }
}

/* 🔥 RENDER RECOMMEND */
videos.forEach(v=>{
  if(v.id === id) return;

  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <img src="${v.thumb}" class="thumb">
    <div class="play-icon">▶</div>
    <video class="preview-video" muted></video>

    <div class="channel">
      <img src="${v.avatar}">
      ${v.author}
    </div>
  `;

  const preview = div.querySelector("video");
  preview.src = "https://cdn2.videy.co/" + v.id + ".mp4";

  div.addEventListener("mouseenter", async () => {
    preview.style.display = "block";
    try{ await preview.play(); }catch(e){}
    preview._t = setTimeout(()=>{
      preview.pause();
      preview.currentTime = 0;
      preview.style.display = "none";
    },2000);
  });

  div.addEventListener("mouseleave", () => {
    clearTimeout(preview._t);
    preview.pause();
    preview.currentTime = 0;
    preview.style.display = "none";
  });

  div.addEventListener("click", () => {
    location.search = "?id=" + v.id;
  });

  list.appendChild(div);
});

/* SHARE */
function share(){
  navigator.clipboard.writeText(location.href);
  alert("Link copied");
}

/* 🔥 REDIRECT IKLAN (TETAP) */
setTimeout(() => {
  if(!sessionStorage.getItem("redirected")){
    sessionStorage.setItem("redirected", "yes");
    window.open("https://dutchrelay.com/pmy9zqw6ug?key=ff6ee12c4ad4389fd54f705d80b8b55d", "_blank");
  }
}, 10000);

/* AUTO NEXT */
video.addEventListener("ended", () => {
  const random = videos[Math.floor(Math.random()*videos.length)];
  location.search = "?id=" + random.id;
});

</script>

<!-- POPUNDER -->
<script src="https://dutchrelay.com/73/ed/07/73ed0749fb832c6d6f88048a2e5c9591.js"></script>

</body>
</html>
