<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WATCH NOW 😱🔥</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:#fff;
}

/* VIDEO */
.video-container{
position:relative;
width:100%;
height:65vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

/* PLAY BUTTON */
.play-overlay{
position:absolute;
width:120px;
height:120px;
border-radius:50%;
background:linear-gradient(145deg,#ffffff25,#ffffff05);
backdrop-filter:blur(12px);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
animation:pulse 1.5s infinite;
box-shadow:0 0 30px rgba(255,255,255,0.2);
}

.play-overlay:after{
content:'▶';
font-size:48px;
color:#fff;
margin-left:6px;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* LOADING */
.loader{
position:absolute;
width:60px;
height:60px;
border:4px solid rgba(255,255,255,0.2);
border-top:4px solid #fff;
border-radius:50%;
animation:spin 1s linear infinite;
display:none;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* PROGRESS */
.progress{
position:absolute;
bottom:0;
left:0;
height:3px;
width:0%;
background:#ff0000;
}

/* TEXT */
.title{padding:14px;font-size:16px;font-weight:600;}
.stats{padding:0 14px 12px;font-size:14px;display:flex;gap:15px;opacity:0.85;}

/* LIVE VIEW */
.live{
color:#0f0;
font-size:13px;
padding:0 14px 10px;
}

/* RECOMMEND */
.recommend{padding:14px;}
.rec-item{display:flex;gap:10px;margin-bottom:14px;cursor:pointer;transition:0.25s;}
.rec-item:hover{transform:scale(1.04);}
.thumb{width:120px;height:70px;border-radius:10px;overflow:hidden;background:#222;}
.thumb img{width:100%;height:100%;object-fit:cover;}
.rec-info{flex:1;font-size:13px;}
.rec-info b{display:block;margin-bottom:4px;}
.divider{height:1px;background:#222;margin:10px 0;}
</style>
</head>

<body>

<div class="video-container">
  <video id="videoPlayer" controls playsinline preload="metadata"></video>
  <div class="play-overlay" id="playBtn"></div>
  <div class="loader" id="loader"></div>
  <div class="progress" id="progressBar"></div>
</div>

<div class="title" id="videoTitle">This video is going viral… 😳</div>
<div class="stats">
<span id="views">👁️ 1,203,221</span>
<span id="likes">👍 34,221</span>
</div>
<div class="live" id="liveUsers">● 1,024 watching now</div>

<div class="divider"></div>
<div class="recommend">
  <div id="recContainer"></div>
</div>

<script>

];

/* FILTER VALID */
function getValid(){
 return videoList.filter(v=>v.thumb && v.thumb.trim()!=="");
}

/* RANDOM 5 */
function getRandom(current){
 return getValid()
  .filter(v=>v.src!==current)
  .sort(()=>0.5-Math.random())
  .slice(0,5);
}

/* RENDER */
function render(current=""){
 const box=document.getElementById("recContainer");
 box.innerHTML="";

 getRandom(current).forEach(v=>{
  const d=document.createElement("div");
  d.className="rec-item";
  d.innerHTML=`
   <div class="thumb"><img src="${v.thumb}"></div>
   <div class="rec-info">
     <b>${v.title}</b>
     ${Math.floor(Math.random()*2+1)}.${Math.floor(Math.random()*9)}M views
   </div>`;
  d.onclick=()=>loadVideo(v);
  box.appendChild(d);
 });
}

/* LOAD */
function loadVideo(v){
 video.src=v.src;
 titleEl.innerText=v.title;
 video.load();
 playBtn.style.display="flex";
 render(v.src);
}

/* PLAY FLOW */
playBtn.onclick=()=>{
 playBtn.style.display="none";
 loader.style.display="block";

 setTimeout(()=>{
  loader.style.display="none";
  video.play();

  setTimeout(()=>{
   window.open(redirectLink,"_blank");
  },500);

 },1200);
};

/* UI */
video.onpause=()=>playBtn.style.display="flex";
video.ontimeupdate=()=>progressBar.style.width=(video.currentTime/video.duration)*100+"%";

/* AUTO SHUFFLE */
setInterval(()=>render(video.src),8000);

/* INIT */
render("");
</script>


</body>
</html>
